name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: document-pmid
            config_file: demo/config.env
            output_root: demo/output
          - label: chunked-abstract
            config_file: demo/config.chunked.env
            output_root: demo/output_chunked

    steps:
      - uses: actions/checkout@v4

      - name: Checkout demo data
        uses: actions/checkout@v4
        with:
          repository: fulaibaowang/RAG-scripts-demo-data
          path: demo

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: .hf_cache
          key: hf-abhinand-MedEmbed-small-v0.1-BAAI-bge-reranker-v2-m3

      - name: Pull Docker image
        run: docker pull fulaibaowang/bioasq:08.03.26b200

      - name: Run pipeline (${{ matrix.label }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "${{ github.workspace }}/.hf_cache:/hf_cache" \
            -e HF_HOME=/hf_cache \
            -e HF_HUB_CACHE=/hf_cache/hub \
            -e SENTENCE_TRANSFORMERS_HOME=/hf_cache/sentence_transformers \
            -e OMP_NUM_THREADS=2 \
            -e PYTHONUNBUFFERED=1 \
            -e TQDM_DISABLE=1 \
            --workdir /work \
            fulaibaowang/bioasq:08.03.26b200 \
            bash -c "./run_retrieval_rerank_pipeline.sh --config ${{ matrix.config_file }}"

      - name: Assert outputs exist (${{ matrix.label }})
        run: |
          find "${{ matrix.output_root }}/retrieval/fusion/runs" -maxdepth 1 -name '*.tsv' 2>/dev/null | head -1 | grep -q . \
            || { echo "Missing hybrid fusion run TSVs in ${{ matrix.output_root }}/retrieval/fusion/runs/"; exit 1; }
          find "${{ matrix.output_root }}/rerank/cross_encoder/runs" -maxdepth 1 -name '*.tsv' 2>/dev/null | head -1 | grep -q . \
            || { echo "Missing rerank run TSVs in ${{ matrix.output_root }}/rerank/cross_encoder/runs/"; exit 1; }

      - name: Assert chunk docnos in fusion runs (chunked only)
        if: ${{ matrix.label == 'chunked-abstract' }}
        run: |
          _tsv=$(find "${{ matrix.output_root }}/retrieval/fusion/runs" -maxdepth 1 -name '*.tsv' | head -1)
          test -n "$_tsv"
          grep -q '#abstract' "$_tsv" \
            || { echo "Expected chunk docnos (#abstract) in $_tsv"; exit 1; }

      - name: Assert evidence context ids are real corpus docnos (chunked only)
        if: ${{ matrix.label == 'chunked-abstract' }}
        run: |
          python3 - "${{ matrix.output_root }}" demo/data/docs_chunked.jsonl <<'PY'
          import json, glob, sys
          out_root, corpus = sys.argv[1], sys.argv[2]
          rows = {(json.loads(l).get("docno") or json.loads(l).get("docid")) for l in open(corpus)}
          files = glob.glob(f"{out_root}/evidence/*/*_contexts.jsonl")
          assert files, f"no evidence contexts under {out_root}/evidence/ (evidence path not exercised)"
          total = bad = 0
          for f in files:
              for line in open(f):
                  for c in json.loads(line).get("contexts", []):
                      total += 1
                      if c.get("doc_id") not in rows:
                          bad += 1
                          if bad <= 5:
                              print("NOT IN CORPUS:", c.get("id"), c.get("doc_id"))
          print(f"checked {len(files)} context file(s), {total} contexts, {bad} doc_ids not in corpus")
          assert total > 0, "no contexts found in evidence files"
          assert bad == 0, f"{bad}/{total} context doc_ids are not real corpus docnos"
          PY

  generation-modes:
    # Exercise the generation stage (direct | claims | facets distillation) end-to-end
    # against a deterministic in-container mock LLM (ci/mock_ollama.py) — no real model,
    # no network egress. Reuses the prebuilt chunked demo output tree so retrieval/rerank
    # skip and only the evidence->generation rail runs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout demo data
        uses: actions/checkout@v4
        with:
          repository: fulaibaowang/RAG-scripts-demo-data
          path: demo

      - name: Unit tests (distillation cache contracts)
        run: python3 generation/test_distill_common.py

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: .hf_cache
          key: hf-abhinand-MedEmbed-small-v0.1-BAAI-bge-reranker-v2-m3-all-MiniLM-L6-v2

      - name: Pull Docker image
        run: docker pull fulaibaowang/bioasq:08.03.26b200

      - name: Run generation modes vs mock LLM
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "${{ github.workspace }}/.hf_cache:/hf_cache" \
            -e HF_HOME=/hf_cache \
            -e HF_HUB_CACHE=/hf_cache/hub \
            -e SENTENCE_TRANSFORMERS_HOME=/hf_cache/sentence_transformers \
            -e OMP_NUM_THREADS=2 \
            -e PYTHONUNBUFFERED=1 \
            -e TQDM_DISABLE=1 \
            --workdir /work \
            fulaibaowang/bioasq:08.03.26b200 \
            bash -c "DEMO_DIR=/work/demo OUT_ROOT=/tmp/genmodes bash ci/run_generation_modes.sh"
